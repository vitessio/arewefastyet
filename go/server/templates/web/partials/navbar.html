{{ define "navbar" }}
<nav class="flex flex-col relative">
  <div class="w-full bg-background z-[49] flex justify-between lg:justify-center p-4 border-b border-border">
    <a href="/" class="flex flex-1 gap-x-2 items-center">
      <img src="/static/logo.png" class="h-[2em] shrink-0" alt="logo" />
      <h1 class="font-light text-lg md:hidden lg:block">arewefastyet</h1>
    </a>

    <div class="flex justify-end items-center gap-x-4 lg:justify-end lg:flex-shrink-0 ml-8">
      <div class="hidden md:flex md:gap-x-3 gap-x-4 justify-center items-center">
        {{ $path := .Path }}
        {{ range $item := .NavItems }}
        <a
          href="{{ $item.To }}"
          class="text-lg hover:text-primary/80 {{ if eq $path $item.To }}text-primary{{ else }}text-foreground/80{{ end }}"
          >{{ $item.Title }}</a
        >
        {{ end }}
      </div>

      <!-- Theme toggle -->
      <div x-data="{ openMenu: false }" class="relative">
        <button
          @click="openMenu = !openMenu"
          class="inline-flex items-center justify-center h-9 w-9 rounded-md border border-border hover:bg-muted"
          aria-label="Toggle theme"
        >
          <i class="fa-solid fa-sun dark:hidden"></i>
          <i class="fa-solid fa-moon hidden dark:inline"></i>
        </button>
        <div
          x-show="openMenu"
          x-transition
          @click.outside="openMenu = false"
          x-cloak
          class="absolute right-0 mt-2 w-36 rounded-md border border-border bg-popover text-popover-foreground shadow-lg py-1 z-[60]"
        >
          <button @click="setTheme('light'); openMenu = false" class="block w-full text-left px-3 py-1.5 hover:bg-muted">Light</button>
          <button @click="setTheme('dark'); openMenu = false" class="block w-full text-left px-3 py-1.5 hover:bg-muted">Dark</button>
          <button @click="setTheme('system'); openMenu = false" class="block w-full text-left px-3 py-1.5 hover:bg-muted">System</button>
        </div>
      </div>

      <!-- Command palette (Cmd/Ctrl+K) -->
      <div
        x-data="commandPalette()"
        @keydown.window.meta.k.prevent="show()"
        @keydown.window.ctrl.k.prevent="show()"
      >
        <button
          @click="show()"
          class="inline-flex items-center gap-x-2 rounded-md border border-border px-3 h-9 text-sm text-muted-foreground hover:bg-muted"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
          <span class="hidden lg:inline">Search</span>
          <kbd class="hidden lg:inline text-xs border border-border rounded px-1">⌘K</kbd>
        </button>

        <div
          x-show="open"
          x-cloak
          @keydown.escape.window="open = false"
          class="fixed inset-0 z-[100] flex items-start justify-center pt-[15vh] bg-black/50"
          @click.self="open = false"
        >
          <div class="w-full max-w-lg rounded-lg border border-border bg-popover text-popover-foreground shadow-xl overflow-hidden">
            <input
              x-ref="search"
              x-model="query"
              @keydown.enter="enter()"
              type="text"
              placeholder="Type a command or search…"
              class="w-full px-4 py-3 bg-transparent outline-none border-b border-border"
            />
            <ul class="max-h-72 overflow-y-auto py-2">
              <template x-for="(item, i) in filtered()" :key="item.to">
                <li>
                  <a
                    :href="item.to"
                    class="block px-4 py-2 hover:bg-muted"
                    x-text="item.title"
                  ></a>
                </li>
              </template>
              <li x-show="filtered().length === 0" class="px-4 py-2 text-muted-foreground">No results</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Mobile menu -->
      <div x-data="{ open: false }" class="md:hidden">
        <button @click="open = true" class="relative text-3xl flex items-center" aria-label="Open Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div x-show="open" x-cloak class="fixed inset-0 z-[100] bg-black/50" @click.self="open = false">
          <div class="absolute right-0 top-0 h-full w-3/4 max-w-xs bg-background border-l border-accent p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
              <span class="font-medium">Vitess | Arewefastyet</span>
              <button @click="open = false" aria-label="Close menu"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <a href="/" class="text-xl font-medium py-3 text-foreground/80 hover:text-primary/80">Home</a>
            {{ range $item := .NavItems }}
            <a href="{{ $item.To }}" class="text-xl font-medium py-3 text-foreground/80 hover:text-primary/80">{{ $item.Title }}</a>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
{{ end }}
