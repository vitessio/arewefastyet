{{ define "navbar" }}
<nav class="flex flex-col relative">
  <div class="w-full bg-background z-[49] flex justify-between lg:justify-center p-4 border-b border-border">
    <a href="/" class="flex flex-1 gap-x-2 items-center">
      <img src="/static/logo.png" class="h-[2em] shrink-0" alt="logo" />
      <h1 class="font-normal text-lg md:hidden lg:block">arewefastyet</h1>
    </a>

    <div class="flex justify-end items-center gap-x-4 lg:justify-end lg:flex-shrink-0 ml-8">
      <div class="hidden md:flex md:gap-x-3 gap-x-4 justify-center items-center">
        {{ $path := .Path }}
        {{ range $item := .NavItems }}
        <a
          href="{{ $item.To }}"
          class="text-lg hover:text-primary/80 {{ if eq $path $item.To }}text-primary{{ else }}text-foreground/80{{ end }}"
          >{{ $item.Title }}</a
        >
        {{ end }}
      </div>

      <!-- Theme toggle: direct dark/light toggle with animated Sun/Moon icons
           (mirrors the React ModeToggle). -->
      <button
        type="button"
        onclick="toggleTheme()"
        class="relative inline-flex items-center justify-center h-10 w-10 rounded-md text-foreground hover:bg-accent hover:text-accent-foreground"
        aria-label="Toggle theme"
      >
        {{ template "iconSun" "h-[1.5rem] w-[1.5rem] rotate-0 scale-100 transition-transform dark:-rotate-90 dark:scale-0" }}
        {{ template "iconMoon" "absolute h-[1.5rem] w-[1.5rem] rotate-90 scale-0 transition-transform dark:rotate-0 dark:scale-100" }}
        <span class="sr-only">Toggle theme</span>
      </button>

      <!-- Commit search (Cmd/Ctrl+K) -->
      <div
        x-data="commandPalette()"
        @keydown.window.meta.k.prevent="show()"
        @keydown.window.ctrl.k.prevent="show()"
      >
        <button
          @click="show()"
          class="relative inline-flex items-center justify-start whitespace-nowrap rounded-[0.5rem] border border-input bg-muted/50 h-8 px-4 py-2 text-sm font-normal text-muted-foreground shadow-none hover:bg-accent hover:text-accent-foreground w-40 lg:w-64 sm:pr-12"
        >
          <span class="hidden lg:inline-flex">Search a commit...</span>
          <span class="inline-flex lg:hidden">Search...</span>
          <kbd class="pointer-events-none absolute right-[0.3rem] top-[0.3rem] hidden h-5 select-none items-center gap-1 rounded border bg-muted px-1.5 font-mono text-[10px] font-medium text-muted-foreground opacity-100 sm:flex">
            <span class="text-xs">⌘</span>K
          </kbd>
        </button>

        <div
          x-show="open"
          x-cloak
          @keydown.escape.window="open = false"
          class="fixed inset-0 z-[100] flex items-start justify-center pt-[15vh] bg-black/50"
          @click.self="open = false"
        >
          <div class="w-full max-w-lg rounded-lg border border-border bg-popover text-popover-foreground shadow-xl overflow-hidden">
            <div class="flex items-center border-b border-border px-3">
              {{ template "iconMagnifyingGlass" "mr-2 h-4 w-4 shrink-0 opacity-50" }}
              <input
                x-ref="search"
                x-model="query"
                @keydown.enter.prevent="enter()"
                type="text"
                placeholder="Search a commit..."
                class="flex h-11 w-full bg-transparent py-3 text-sm outline-none placeholder:text-muted-foreground"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile menu -->
      <div x-data="{ open: false }" class="md:hidden">
        <button @click="open = true" class="relative text-3xl flex items-center" aria-label="Open Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div x-show="open" x-cloak class="fixed inset-0 z-[100] bg-black/50" @click.self="open = false">
          <div class="absolute right-0 top-0 h-full w-3/4 max-w-xs bg-background border-l border-accent p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
              <span class="font-medium">Vitess | Arewefastyet</span>
              <button @click="open = false" aria-label="Close menu"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <a href="/" class="text-xl font-medium py-3 text-foreground/80 hover:text-primary/80">Home</a>
            {{ range $item := .NavItems }}
            <a href="{{ $item.To }}" class="text-xl font-medium py-3 text-foreground/80 hover:text-primary/80">{{ $item.Title }}</a>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
{{ end }}
