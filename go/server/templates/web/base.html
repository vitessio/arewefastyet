{{ define "base" }}<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ if .Title }}{{ .Title }}{{ else }}Vitess | Benchmark{{ end }}</title>

    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="shortcut icon" href="/static/favicon.png" type="image/png" />
    <meta name="description" content="Scalable. Reliable. MySQL-compatible. Cloud-native. Database." />

    <!-- Avoid a flash of the wrong theme: apply the persisted/system theme before paint. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <!-- Open Sans font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome (icons used across the site) -->
    <script src="https://kit.fontawesome.com/053006010f.js" crossorigin="anonymous"></script>

    <!--
      Tailwind utilities are compiled at image-build time by the standalone
      Tailwind CLI (no Node) into /static/app.css from go/server/tailwind.config.js
      + tailwind.css, then embedded into the binary. The light/dark design tokens
      stay inline below so the theme applies before paint.
    -->
    <link rel="stylesheet" href="/static/app.css" />

    <!-- Design tokens (light + dark) ported from website/src/assets/styles/tailwind.css -->
    <style>
      [x-cloak] { display: none !important; }
      :root {
        --background: 0 0% 100%;
        --foreground: 20 14.3% 4.1%;
        --card: 0 0% 100%;
        --card-foreground: 20 14.3% 4.1%;
        --popover: 0 0% 100%;
        --popover-foreground: 20 14.3% 4.1%;
        --primary: 24.6 95% 53.1%;
        --primary-foreground: 60 9.1% 97.8%;
        --secondary: 60 4.8% 95.9%;
        --secondary-foreground: 24 9.8% 10%;
        --muted: 60 4.8% 95.9%;
        --muted-foreground: 25 5.3% 44.7%;
        --accent: 60 4.8% 95.9%;
        --accent-foreground: 24 9.8% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 60 9.1% 97.8%;
        --warning: 38 92% 50%;
        --warning-foreground: 48 96% 89%;
        --success: 120, 100%, 25%;
        --success-foreground: 60 9.1% 97.8%;
        --progress: 240, 83%, 58%;
        --progress-foreground: 60 9.1% 97.8%;
        --border: 20 5.9% 90%;
        --input: 20 5.9% 90%;
        --ring: 24.6 95% 53.1%;
        --radius: 0.5rem;
        --front: 0 0% 10%;
        --back: 0 0% 100%;
        --theme: 48 100% 50%;
      }
      .dark {
        --background: 20 14.3% 4.1%;
        --foreground: 60 9.1% 97.8%;
        --card: 20 14.3% 4.1%;
        --card-foreground: 60 9.1% 97.8%;
        --popover: 20 14.3% 4.1%;
        --popover-foreground: 60 9.1% 97.8%;
        --primary: 20.5 90.2% 48.2%;
        --primary-foreground: 60 9.1% 97.8%;
        --secondary: 12 6.5% 15.1%;
        --secondary-foreground: 60 9.1% 97.8%;
        --muted: 12 6.5% 15.1%;
        --muted-foreground: 24 5.4% 63.9%;
        --accent: 12 6.5% 15.1%;
        --accent-foreground: 60 9.1% 97.8%;
        --destructive: 0 72.2% 50.6%;
        --destructive-foreground: 60 9.1% 97.8%;
        --warning: 38 92% 50%;
        --warning-foreground: 48 96% 89%;
        --border: 12 6.5% 15.1%;
        --input: 12 6.5% 15.1%;
        --ring: 20.5 90.2% 48.2%;
        --radius: 0.5rem;
        --front: 0 0% 100%;
        --back: 0 0% 10%;
        --theme: 48 100% 50%;
      }
    </style>

    <!-- Charts + interactivity. Chart.js for charts, HTMX for partial swaps,
         Alpine for small client state (menus, theme dropdown, command palette).
         Vendored into the embedded static FS (no runtime CDN dependency); pinned
         versions live in the filenames. -->
    <script src="/static/vendor/chartjs-4.4.3.min.js"></script>
    <script src="/static/vendor/htmx-1.9.12.min.js"></script>
    <script defer src="/static/vendor/alpinejs-3.14.1.min.js"></script>

    <script src="/static/app.js"></script>
  </head>

  <body class="bg-background text-foreground">
    <div class="flex flex-col min-h-screen">
      {{ template "navbar" . }}
      <div class="flex-1">
        {{ template "content" . }}
      </div>
      {{ template "footer" . }}
    </div>
    {{ template "compare_widget" . }}
  </body>
</html>
{{ end }}
