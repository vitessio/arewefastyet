name: Run ansible-lint
description: Install and run the repository's pinned ansible-lint command.

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        enable-cache: true
        python-version: "3.12"

    - name: Install ansible-lint
      shell: bash
      run: |
        uv tool install --python 3.12 "ansible-lint[lock] @ git+https://github.com/ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c"
        ansible-lint --version

    - name: Install ansible dependencies
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        ansible-galaxy install -r ansible/requirements.yml

    - name: Run ansible-lint
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        exit_code=0
        ansible-lint -x 301,302,303,305,306,204,208 ansible/ || exit_code=$?

        if [[ "${exit_code}" != "0" ]]; then
          echo "::error::ansible-lint exited with ${exit_code}, expected 0"
          exit 1
        fi
