      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 12

  vtctld:
    <<: *vitess-image
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      <<: *topo-env
    volumes:
      - ./vtctld/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "15000:15000"
    networks:
      - bench
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:15000/debug/health"]
      interval: 5s
      timeout: 5s
      retries: 24

  mysql-1001:
    <<: *vitess-image
    hostname: mysql-1001
    cpus: 4
    depends_on:
      vtctld:
        condition: service_healthy
    environment:
      TABLET_ID: "1001"
    volumes:
      - ./mysql/entrypoint.sh:/entrypoint.sh:ro
      - tablet-1001-data:/vt
      - tablet-1001-socket:/vt/socket
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "9104:9104"
      - "16011:16011"
    networks:
      - bench
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD-SHELL", "test -S /vt/socket/mysql1001.sock"]
      interval: 5s
      timeout: 5s
      retries: 60

  mysqld-exporter-1001:
    <<: *vitess-image
    network_mode: "service:mysql-1001"
    depends_on:
      mysql-1001:
        condition: service_healthy
    environment:
      TABLET_ID: "1001"
      MYSQLD_EXPORTER_PORT: "9104"
      DATA_SOURCE_NAME: "root@unix(/vt/socket/mysql1001.sock)/"
    volumes:
      - ./mysqld-exporter/entrypoint.sh:/entrypoint.sh:ro
      - tablet-1001-socket:/vt/socket
    entrypoint: ["/bin/bash", "/entrypoint.sh"]

  tablet-1001:
    <<: *vitess-image
