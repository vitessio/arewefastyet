version: "3.8"
networks:
  default:
    driver: bridge

volumes:
  # Dev-only: persists the api's vitess clone across recreates (see api service).
  aafy-vitess:
  # Dev-only: persists the local MySQL data dir (see db service).
  aafy-db:

services:
  # Dev-only: a local MySQL so the DB-backed pages work without PlanetScale.
  # The canonical schema (sql/schema.sql) and a small dev dataset (sql/dev_seed.sql)
  # are loaded on first boot; the api connects with planetscale-db-tls=false
  # (see config/dev/secrets.yaml). Remove this service to point at a real DB.
  db:
    image: "mysql:8.0"
    container_name: "db"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "aafy"
      MYSQL_DATABASE: "arewefastyet"
      MYSQL_USER: "aafy"
      MYSQL_PASSWORD: "aafy"
    # Native-password auth so the Go driver connects over the (TLS-less) dev link.
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports:
      - "3307:3306"
    volumes:
      - "aafy-db:/var/lib/mysql"
      # Numeric prefixes force schema-before-seed ordering regardless of filename.
      - "./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro"
      - "./sql/dev_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-paafy"]
      interval: 5s
      timeout: 5s
      retries: 20

  traefik:
    image: "traefik:3.6"
    container_name: "traefik"
    command:
      - "--accesslog=false"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  api:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    image: "arewefastyet-api"
    container_name: "api"
    depends_on:
      db:
        condition: service_healthy
    # Dev-only convenience: reach the api directly at http://localhost:8090/ without
    # going through Traefik (which isn't usually run in dev). Traefik now routes the
    # host root to the api too (see the catch-all rule below); the React frontend is gone.
    ports:
      - "8090:8080"
    volumes:
      - "~/.ssh:/root/.ssh"
      - "./exec/:/exec"
      - "./config/dev/config.yaml:/config/config.yaml"
      - "./config/dev/secrets.yaml:/config/secrets.yaml"
      - "./config/benchmarks:/config/benchmarks"
      - "./ansible:/ansible"
      # Dev-only: persist the vitess clone (web-vitess-path=/tmp) across container
      # rebuilds/recreates so we don't re-clone ~483MB every time.
      - "aafy-vitess:/tmp"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`)"
      - "traefik.http.routers.api.entrypoints=http"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  admin:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.admin
    image: "arewefastyet-admin"
    container_name: "admin"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "./config/dev/config.yaml:/config/config.yaml"
      - "./config/dev/secrets.yaml:/config/secrets.yaml"
      - "./go/admin/templates/:/go/admin/templates/"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`localhost`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=http"
      - "traefik.http.services.admin.loadbalancer.server.port=8081"

  cleanup_executions:
    image: alpine
    restart: on-failure
    container_name: "cleanup_executions"
    volumes:
      - "./exec/:/exec"
      - "./infra/cleanup/cleanup_exec.sh:/cleanup.sh"
    entrypoint: sh -c "echo '0 0 * * * /cleanup.sh' > /etc/crontabs/root && crond -f -d 8"