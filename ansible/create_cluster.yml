---
- name: Clean Post Macrobench
  import_playbook: clean_macrobench.yml

- name: Build Vitess
  hosts: all
  roles:
    - role: vitess_build
      vars:
        clean_vtgate: false
        clean_vttablet: false
        clean_vtctld: false

- name: Start etcd
  hosts:
    - etcd
  roles:
    - role: etcd
      vars:
        etcd_launch: true

- name: Start vtctld
  hosts: vtctld
  roles:
    - role: vtctld
      vars:
        clean_vtctld: false

- name: Start vtgate
  hosts: vtgate
  roles:
    - role: vtgate
      vars:
        clean_vtgate: false
        gateways_loadbalance: "{% set targets = [] -%}{% for host in groups['vtgate'] -%}{% for gateway in hostvars[host]['gateways'] -%}{{ targets.append( hostvars[host]['ansible_default_ipv4']['address']+':'+(gateway.mysql_port
          | default(13306) | string )) }}{% endfor -%}{% endfor -%}{{ targets }}"

- name: Start vttablet
  hosts: vttablet
  roles:
    - role: vttablet
      vars:
        clean_vttablet: false

- name: Apply VSchema
  hosts: vtctld
  tasks:
    - name: Gather facts
      ansible.builtin.setup:
        gather_subset: network

    - name: Ensure vtctld is configured
      ansible.builtin.include_role:
        name: vtctld
        tasks_from: ensure

    - name: Get VSchema
      ansible.builtin.copy:
        src: "{{ vitess_vschema_path }}"
        dest: /tmp/vschema_sysbench.json
        mode: "0644"
        force: true

    - name: Apply VSchema
      ansible.builtin.shell: |
        vtctlclient --server {{ groups['vtctld'][0] }}:15999 ApplyVSchema -- --vschema="$(cat /tmp/vschema_sysbench.json)" main
    - name: Print go version
      ansible.builtin.debug: msg="VSchema is applied."
