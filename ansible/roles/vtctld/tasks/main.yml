---
- name: Create users
  ansible.builtin.include_role:
    name: "vitess_build"
    tasks_from: create_users

- name: Make sure vtctld is stopped
  when: clean_vtctld | bool
  ansible.builtin.include_role:
    name: "vtctld"
    tasks_from: "clean"

- name: Ensure vitess directories
  become: true
  become_user: root
  with_items:
    - "{{ vitess_root }}"
    - "{{ vitess_root }}/tmp"
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"
    mode: "0755"

- name: Ensure config directories
  become: true
  become_user: root
  with_items:
    - /etc/vitess/conf
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"

- name: Install systemd unit
  ansible.builtin.include_tasks: systemd.yml
- name: Start cell
  become: true
  become_user: root
  when:
    - enable_vtctld | bool
  ansible.builtin.service:
    name: cell@{{ vitess_cell }}
    enabled: true
    state: started
  changed_when: false

- name: Start vtctld
  become: true
  become_user: root
  when:
    - enable_vtctld | bool
  ansible.builtin.service:
    name: vtctld@{{ vitess_cell }}
    enabled: true
    state: started
  changed_when: false
