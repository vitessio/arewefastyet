---
- name: Make sure old vtgate are stopped
  when: clean_vtgate | bool
  ansible.builtin.include_role:
    name: "vtgate"
    tasks_from: clean

- name: Create users
  ansible.builtin.include_role:
    name: "vitess_build"
    tasks_from: create_users

- name: Ensure vitess directories
  become: true
  become_user: root
  with_items:
    - "{{ vitess_root }}"
    - "{{ vitess_root }}/socket"
    - "/etc/vitess/conf"
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"
    mode: "0755"

- name: Install systemd unit
  ansible.builtin.include_role:
    name: "vtgate"
    tasks_from: systemd

- name: Install config files
  ansible.builtin.include_tasks: vtgate.yml
  loop: "{{ gateways }}"
  loop_control:
    loop_var: gateway

- name: Turn on loadbalancing
  vars:
    loadbalancing: true
  when:
    - enable_vtgate | bool
  ansible.builtin.include_role:
    name: vtgate
    tasks_from: sysbench_loadbalance.yml
