---
- name: Check if there is a vtgate service
  ansible.builtin.command: service vtgate@{{ gateway.id }} status
  register: vtgate_status
  failed_when: not(vtgate_status.rc == 1 or vtgate_status.rc == 3 or vtgate_status.rc == 4 or vtgate_status.rc == 0)

- name: Stop old vtgate
  become: true
  become_user: root
  ansible.builtin.service:
    name: "vtgate@{{ gateway.id }}"
    enabled: false
    state: stopped
  changed_when: false
  when: vtgate_status.rc == 0
  failed_when: false

- name: Remove old config
  become: true
  become_user: root
  with_items:
    - "/etc/vitess/conf/vtgate-{{ gateway.id }}.conf"
  ansible.builtin.file:
    state: absent
    path: "{{ item }}"
  failed_when: false

- name: Systemctl daemon-reload
  become: true
  become_user: root
  ansible.builtin.systemd:
    daemon_reload: true
  failed_when: false
