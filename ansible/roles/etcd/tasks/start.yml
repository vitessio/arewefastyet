---
- name: Install etcd.service configuration
  become: true
  become_user: root
  with_items:
    - f: etcd.conf
      d: /etc/etcd
  ansible.builtin.template:
    src: "{{ item.f }}.j2"
    dest: "{{ item.d }}/{{ item.f }}"
    owner: "{{ etcd_user }}"
    group: "{{ etcd_group }}"

- name: Install etcd.service systemd unit
  become: true
  become_user: root
  register: etcd_service_modified
  with_items:
    - f: etcd.service
      d: /etc/systemd/system
  ansible.builtin.template:
    src: "{{ item.f }}.j2"
    dest: "{{ item.d }}/{{ item.f }}"
    mode: '{{ item.m | default("0644") }}'

- name: Systemctl daemon-reload
  become: true
  become_user: root
  when: etcd_launch and etcd_service_modified is changed
  ansible.builtin.systemd:
    daemon_reload: true

- name: Launching etcd...
  when: etcd_launch | bool
  become: true
  become_user: root
  ansible.builtin.service:
    name: etcd
    enabled: true
    state: started
  changed_when: false
