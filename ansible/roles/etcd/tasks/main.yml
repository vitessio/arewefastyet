---
- name: Clean etcd
  ansible.builtin.include_tasks: clean.yml
- name: Install etcd
  ansible.builtin.include_tasks: install.yml
  when: not etcd_launch | bool

- name: Collect facts
  ansible.builtin.set_fact:
    cacheable: true
    etcd_listen_public: '{{ "0.0.0.0" if etcd_iface_public == "all" else ansible_default_ipv4.address if etcd_iface_public == "default" else hostvars[inventory_hostname]["ansible_"
      ~ etcd_iface_public]["ipv4"]["address"] }}'
    etcd_listen_cluster: '{{ "0.0.0.0" if etcd_iface_cluster == "all" else ansible_default_ipv4.address if etcd_iface_cluster == "default" else hostvars[inventory_hostname]["ansible_"
      ~ etcd_iface_cluster]["ipv4"]["address"] }}'
    etcd_address_public: '{{ ansible_fqdn if not etcd_use_ips | bool else ansible_default_ipv4.address if etcd_iface_public is in [ "all", "default" ] else hostvars[inventory_hostname]["ansible_"
      ~ etcd_iface_public]["ipv4"]["address"] }}'
    etcd_address_cluster: '{{ ansible_fqdn if not etcd_use_ips | bool else ansible_default_ipv4.address if etcd_iface_cluster is in [ "all", "default" ] else hostvars[inventory_hostname]["ansible_"
      ~ etcd_iface_cluster]["ipv4"]["address"] }}'

- name: Create etcd group
  become: true
  become_user: root
  changed_when: false
  ansible.builtin.group:
    name: "{{ etcd_group }}"
    state: present

- name: Create etcd user
  become: true
  become_user: root
  changed_when: false
  ansible.builtin.user:
    name: "{{ etcd_user }}"
    group: "{{ etcd_group }}"
    home: "{{ etcd_data_dir }}"
    state: present

- name: Create dirs...
  become: true
  become_user: root
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ etcd_user }}"
    group: "{{ etcd_group }}"
    mode: "0755"
  with_items:
    - /etc/etcd

- name: Start etcd
  ansible.builtin.include_tasks: start.yml
  when: etcd_launch | bool
