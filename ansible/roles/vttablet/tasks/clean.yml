---
- name: Reinstall systemd unit if needed
  ansible.builtin.include_tasks: systemd.yml
- name: Clean all vttablet
  ansible.builtin.include_tasks: clean_one.yml
  loop: "{{ all_tablets }}"
  loop_control:
    loop_var: tablet

- name: Remove old config
  become: true
  become_user: root
  with_items:
    - "/etc/systemd/system/vttablet@.service"
    - "/etc/systemd/system/mysqlctld@.service"
    - "/etc/systemd/system/mysqld_exporter@.service"
  ansible.builtin.file:
    state: absent
    path: "{{ item }}"

- name: Systemctl daemon-reload
  become: true
  become_user: root
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remove binary
  ansible.builtin.shell: rm -f $(which vttablet mysqlctld mysqlctl)
