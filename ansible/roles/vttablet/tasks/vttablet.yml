---
- name: Ensure vttablet directories
  become: true
  become_user: root
  with_items:
    - "{{ vitess_root }}/tmp/"
    - "{{ vitess_root }}/tmp/vttablet-{{ tablet.id }}"
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"

- name: Install configs
  become: true
  become_user: root
  with_items:
    - s: vttablet.conf
      d: "/etc/vitess/conf/vttablet-{{ tablet.id }}.conf"
    - s: extra_my.cnf
      d: "/etc/vitess/extra_my{{ tablet.id }}.cnf"
  ansible.builtin.template:
    src: "{{ item.s }}.j2"
    dest: "{{ item.d }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"
    mode: "0644"

- name: Start mysql
  become: true
  become_user: root
  when:
    - enable_vttablet | bool
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  with_items:
    - "mysqlctld@{{ tablet.id }}"
    - "mysqld_exporter@{{ tablet.id }}"
  changed_when: false

- name: Wait for mysql socket
  become: true
  become_user: root
  when:
    - enable_vttablet | bool
  ansible.builtin.wait_for:
    path: "{{ vitess_root }}/socket/mysql{{ tablet.id }}.sock"
    delay: 5
    timeout: 60
    state: present
    msg: "mysql socket needs to be present {{ vitess_root }}/socket/mysql{{ tablet.id }}.sock"
  ignore_errors: true

- name: Wait for mysqlctl socket
  become: true
  become_user: root
  when:
    - enable_vttablet | bool
  ansible.builtin.wait_for:
    path: "{{ vitess_root }}/socket/mysqlctl{{ tablet.id }}.sock"
    delay: 5
    timeout: 60
    state: present
    msg: "mysqlctl socket needs to be present at {{ vitess_root }}/socket/mysqlctl{{ tablet.id }}.sock"
  ignore_errors: true

- name: Start vttablet
  become: true
  become_user: root
  when:
    - enable_vttablet | bool
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  with_items:
    - "vttablet@{{ tablet.id }}"
  changed_when: false
