---
- name: Make sure vttablet is stopped
  when: clean_vttablet | bool
  ansible.builtin.include_role:
    name: "vttablet"
    tasks_from: "clean"

- name: Create users
  ansible.builtin.include_role:
    name: "vitess_build"
    tasks_from: create_users

- name: Ensure vitess directories
  become: true
  become_user: root
  with_items:
    - "{{ vitess_root }}"
    - "{{ vitess_root }}/socket"
    - "/etc/vitess/conf"
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ vitess_user }}"
    group: "{{ vitess_group }}"
    mode: "0755"

- name: Install systemd units
  ansible.builtin.include_tasks: systemd.yml
- name: Install config files
  ansible.builtin.include_tasks: vttablet.yml
  loop: "{{ tablets }}"
  loop_control:
    loop_var: tablet
